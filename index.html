<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fitwork-frontend</title>

    <!-- FitWork Design System Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Inisialisasi dark mode sebelum React mount untuk menghindari flash -->
    <script>
      try {
        if (JSON.parse(localStorage.getItem("fitwork-dark-mode"))) {
          document.documentElement.classList.add("dark");
        }
      } catch {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
